<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IloveYou</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      font-family: 'DM Sans', sans-serif;
      color: #111;
    }

    .video-wrap {
      width: 280px;
      height: 280px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: #f0f0f0;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
    }
    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .video-wrap video.active { opacity: 1; }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      text-align: center;
      line-height: 1.5;
      max-width: 320px;
      color: #111;
    }
    h1 em { font-style: italic; color: #f43f5e; }

    .btns {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    #yesBtn {
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 13px 38px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s, transform .15s, font-size .3s, padding .3s;
    }
    #yesBtn:hover { background: #16a34a; transform: scale(1.04); }

    #noBtn {
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 13px 38px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: font-size .3s, padding .3s, opacity .3s;
      white-space: nowrap;
    }
    #noBtn:hover { background: #dc2626; }

    .msg {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      color: #f43f5e;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .5s, transform .5s;
      text-align: center;
      max-width: 320px;
      line-height: 1.7;
      display: none;
    }
    .msg.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="video-wrap">
    <video id="v1" class="active" src="public/Video1.mp4" autoplay loop muted playsinline></video>
    <video id="v2"               src="public/Video2.mp4"          loop muted playsinline></video>
  </div>

  <h1>Babe à, em có yêu anh không?<br/><em>(Thách ấn No)</em></h1>

  <div class="btns" id="btns">
    <button id="yesBtn" onclick="sayYes()">Yes 🩷</button>
    <button id="noBtn"  onclick="pressNo()">No</button>
  </div>

  <p class="msg" id="msg">Anh biết em yêu anh mà<br/>cô bé đáng yêu của anh 😏🌹💗</p>

  <script>
    let noPresses = 0;

    function pressNo() {
      noPresses++;

      const yesBtn = document.getElementById('yesBtn');
      const noBtn  = document.getElementById('noBtn');

      // Yes to dần
      const yesSize = 1.0 + 0.2 * noPresses;
      yesBtn.style.fontSize = yesSize + 'rem';
      yesBtn.style.padding  = `${13 + noPresses * 2}px ${38 + noPresses * 5}px`;

      // No bé dần, không di chuyển
      const noSize = Math.max(0.45, 1.0 - 0.1 * noPresses);
      noBtn.style.fontSize = noSize + 'rem';
      noBtn.style.padding  = `${Math.max(4, 13 - noPresses * 1.5)}px ${Math.max(8, 38 - noPresses * 4)}px`;
      noBtn.style.opacity  = Math.max(0.2, 1 - noPresses * 0.1) + '';
    }

    function sayYes() {
      // Đổi video
      document.getElementById('v1').classList.remove('active');
      const v2 = document.getElementById('v2');
      v2.classList.add('active');
      v2.play();

      // Ẩn nút
      document.getElementById('btns').style.display = 'none';

      // Hiện tin nhắn
      const msg = document.getElementById('msg');
      msg.style.display = 'block';
      setTimeout(() => msg.classList.add('show'), 20);
    }
  </script>
</body>
</html>
